# 网易云音乐桌面应用自动化构建和发布工作流
# 当推送版本标签（格式为 x.x.x）时触发，执行以下三个作业：
# 1. package: 构建应用并生成资源包
# 2. prepare-aur: 准备 Arch Linux 用户仓库（AUR）包文件
# 3. publish-aur: 发布到 AUR 仓库
name: 打包并上传 AUR

# 工作流触发条件：当推送版本标签时触发
on:
  push:
    tags:
      # 匹配版本标签格式：x.x.x（例如 1.0.0, 2.1.3）
      - '\d+.\d+.\d+'

# 定义工作流中的作业
jobs:
  # 作业 1: 构建应用并生成资源包
  package:
    # 在最新的 Ubuntu 环境中运行
    runs-on: ubuntu-latest

    # 授予写入 GitHub 仓库内容的权限（用于创建 Release）
    permissions:
      contents: write

    # 作业步骤定义
    steps:
      # 步骤 1: 检出代码仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2: 设置 Node.js 运行环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          # 使用 Node.js 20.x 版本
          node-version: '20.x'

      # 步骤 3: 安装项目依赖
      - name: 安装依赖
        run: npm install

      # 步骤 4: 打包 Electron 应用为 Linux 版本
      - name: 打包应用
        run: npm run package:linux

      # 步骤 5: 创建发布资源包
      # 将构建产物打包为 tar.gz 压缩包，并生成 SHA256 校验和
      - name: 创建资源包
        run: |
          # 从 package.json 读取包名称
          PKGNAME=$(node -p "require('./package.json').name")

          # 创建资源目录
          RESOURCES_DIR="dist/resources"
          mkdir -p "$RESOURCES_DIR"

          # 复制必要的文件到资源目录
          # 1. Electron 应用的 ASAR 包（主应用文件）
          cp "dist/linux-unpacked/resources/app.asar" "$RESOURCES_DIR/"
          # 2. 桌面启动器文件（.desktop）
          cp "build/netease-cloud-music-web-player.desktop" "$RESOURCES_DIR/"
          # 3. 启动脚本
          cp "build/netease-cloud-music-web-player" "$RESOURCES_DIR/"
          # 4. 应用图标
          cp "build/netease-cloud-music.svg" "$RESOURCES_DIR/"

          # 创建压缩包，文件名格式：包名-版本号.tar.gz
          RESOURCES_PACKAGE="dist/${PKGNAME}-${{ github.ref_name }}.tar.gz"
          tar -czf "$RESOURCES_PACKAGE" -C "$RESOURCES_DIR" .

          # 生成 SHA256 校验和文件
          cd dist
          sha256sum "${PKGNAME}-${{ github.ref_name }}.tar.gz" > "${PKGNAME}-${{ github.ref_name }}.tar.gz.sha256"

          # 将文件路径保存到 GitHub Actions 环境变量中，供后续步骤使用
          echo "ASAR_RELEASE_PATH=$RESOURCES_PACKAGE" >> $GITHUB_ENV
          echo "ASAR_CHECKSUM_PATH=dist/${PKGNAME}-${{ github.ref_name }}.tar.gz.sha256" >> $GITHUB_ENV

      # 步骤 6: 将资源包上传到 GitHub Release
      - name: 上传到 GitHub Release
        env:
          # 使用 GitHub 提供的认证令牌
          GH_TOKEN: ${{ github.token }}
        run: |
          # 使用 gh CLI 上传文件到对应版本的 Release
          # --clobber 参数：覆盖已存在的同名文件
          gh release upload "${{ github.ref_name }}" "${{ env.ASAR_RELEASE_PATH }}" "${{ env.ASAR_CHECKSUM_PATH }}" --clobber

      # 步骤 7: 提取 SHA256 校验值（仅数值部分）
      - name: 保存 SHA256 到 cache
        run: |
          # 从 SHA256 文件中提取校验值（去掉文件名部分）
          awk '{print $1}' "${{ env.ASAR_CHECKSUM_PATH }}" > sha256-value.txt

      # 步骤 8: 将 SHA256 值作为构建产物上传，供后续作业使用
      - name: 上传 SHA256 为 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256-value  # 产物名称
          path: sha256-value.txt  # 要上传的文件路径
          retention-days: 1  # 产物保留时间（天）
  # 作业 2: 准备 Arch Linux 用户仓库（AUR）包文件
  # 在 Arch Linux 容器中运行，生成 PKGBUILD 和 .SRCINFO 文件
  prepare-aur:
    name: 准备 AUR 包文件
    # 在 Ubuntu 环境中运行，但使用容器化执行
    runs-on: ubuntu-latest

    # 依赖关系：需要 package 作业先完成
    needs: [package]

    # 使用 Arch Linux 容器来运行 makepkg 命令
    container:
      image: archlinux:latest  # 最新的 Arch Linux 镜像
      options: --privileged  # 授予特权模式（某些打包操作需要）

    # 作业步骤定义
    steps:
      # 步骤 1: 检出代码仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2: 下载前一个作业上传的 SHA256 值产物
      - name: 下载 SHA256 artifact
        uses: actions/download-artifact@v4
        with:
          name: sha256-value  # 产物名称

      # 步骤 3: 读取 SHA256 值并保存到输出变量中
      - name: 读取 SHA256
        id: vars  # 步骤标识符，用于后续引用
        run: |
          # 将 SHA256 值保存到 GitHub Actions 输出变量中
          echo "sha256=$(cat sha256-value.txt)" >> $GITHUB_OUTPUT

      # 步骤 4: 更新 PKGBUILD 模板文件
      # PKGBUILD 是 Arch Linux 包的构建脚本
      - name: 更新 PKGBUILD
        run: |
          # 复制 PKGBUILD 模板到当前目录
          cp package/arch/aur/PKGBUILD .

          # 使用 sed 命令替换模板中的占位符：
          # 1. 替换版本号占位符 __PKGVER__ 为当前标签版本
          sed -i "s/__PKGVER__/${{ github.ref_name }}/g" PKGBUILD

          # 2. 替换 SHA256 校验和占位符 __SHA256__ 为实际值
          sed -i "s/__SHA256__/${{ steps.vars.outputs.sha256 }}/g" PKGBUILD

      # 步骤 5: 安装 Arch Linux 基础开发工具包
      # base-devel 包含 makepkg、gcc 等打包所需工具
      - name: 安装基础开发工具
        run: |
          # pacman -Sy: 同步包数据库并安装
          # --noconfirm: 自动确认所有提示
          pacman -Sy --noconfirm base-devel

      # 步骤 6: 生成 .SRCINFO 文件
      # .SRCINFO 是 AUR 包的元数据文件，包含依赖关系、版本等信息
      - name: 生成 .SRCINFO
        run: |
          # 将 PKGBUILD 复制到 /tmp 目录（避免权限问题）
          cp PKGBUILD /tmp/

          # 以 nobody 用户身份运行 makepkg 命令生成 .SRCINFO
          # 使用 nobody 用户是 Arch Linux 打包的最佳实践，避免权限问题
          sudo -u nobody sh -c 'cd /tmp && makepkg --printsrcinfo > .SRCINFO'

          # 将生成的 .SRCINFO 文件复制回当前目录
          cp /tmp/.SRCINFO .

      # 步骤 7: 将 PKGBUILD 和 .SRCINFO 上传为构建产物
      # 供下一个作业（publish-aur）使用
      - name: 上传 PKGBUILD 和 .SRCINFO
        uses: actions/upload-artifact@v4
        with:
          name: aur-files  # 产物名称
          include-hidden-files: true  # 包含隐藏文件（.SRCINFO 以点开头）
          path: |
            PKGBUILD
            .SRCINFO
          retention-days: 1  # 产物保留时间（天）
  # 作业 3: 发布到 Arch Linux 用户仓库（AUR）
  # 将生成的包文件推送到 AUR Git 仓库
  publish-aur:
    name: 发布到 AUR
    # 在 Ubuntu 环境中运行
    runs-on: ubuntu-latest

    # 依赖关系：需要 prepare-aur 作业先完成
    needs: [prepare-aur]

    # 作业步骤定义
    steps:
      # 步骤 1: 检出代码仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2: 配置 SSH 密钥用于访问 AUR Git 仓库
      # AUR 使用 SSH 协议进行 Git 操作
      - name: 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # 从 GitHub Secrets 中读取 SSH 私钥
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      # 步骤 3: 下载前一个作业生成的 AUR 包文件
      - name: 下载 AUR 文件
        uses: actions/download-artifact@v4
        with:
          name: aur-files  # 产物名称

      # 步骤 4: 将 AUR 服务器添加到 SSH known_hosts
      # 避免首次连接时的主机验证提示
      - name: 添加 AUR 主机到 known_hosts
        run: |
          # 创建 .ssh 目录（如果不存在）
          mkdir -p ~/.ssh

          # 获取 AUR 服务器的 SSH 公钥并添加到 known_hosts
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      # 步骤 5: 克隆 AUR Git 仓库
      # 每个 AUR 包都有一个对应的 Git 仓库
      - name: 克隆 AUR 仓库
        run: |
          # 克隆 AUR 仓库到本地（aur-repo 目录）
          git clone ${{ vars.AUR_REPO_URL }} aur-repo

          # 进入仓库目录
          cd aur-repo

          # 配置 Git 用户信息（提交时使用）
          git config user.name "${{ vars.AUR_GIT_USER_NAME }}"
          git config user.email "${{ vars.AUR_GIT_USER_EMAIL }}"

      # 步骤 6: 将生成的包文件复制到 AUR 仓库
      - name: 复制 AUR 文件到仓库
        run: |
          # 复制更新后的 PKGBUILD 文件到仓库
          cp PKGBUILD aur-repo/

          # 复制生成的 .SRCINFO 文件到仓库
          cp .SRCINFO aur-repo/

      # 步骤 7: 提交更改并推送到 AUR 仓库
      - name: 提交并推送到 AUR
        run: |
          # 进入 AUR 仓库目录
          cd aur-repo

          # 检查是否有实际更改（避免空提交）
          if git diff --quiet; then
            # 如果没有更改，直接退出（成功状态）
            exit 0
          fi

          # 添加更新的文件到暂存区
          git add PKGBUILD .SRCINFO

          # 提交更改，提交信息包含版本号
          git commit -m "Update to version ${{ github.ref_name }}"

          # 推送到 AUR 仓库的 master 分支
          git push origin master
